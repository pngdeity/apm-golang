name: Verify shared/apm.md matrix secret-stripping fix

# Empirical proof for the env-relay fix in .github/workflows/shared/apm.md.
#
# Two job sets:
#
#   A. prove-old-pattern-strips-output (regression sentinel)
#      Replicates the pre-fix shape (PEM embedded in a job output). Asserts
#      that GitHub Actions still drops the output via its secret-redaction
#      filter (HostContext.SecretMasker.MaskSecrets in actions/runner). If
#      this job ever fails, GH has loosened the rule and we should reassess
#      the fix.
#
#   B. prove-new-pattern-survives (positive proof of the fix)
#      Replicates the post-fix shape (secret-free matrix + env-relay creds).
#      Asserts: (1) the matrix output survives, (2) the dependent matrix job
#      fans out to the expected number of rows, (3) each row successfully
#      resolves ROW_APP_ID / ROW_PRIVATE_KEY via $GITHUB_ENV, and the PEM
#      round-trips intact (SHA-256 comparison; the SHA is not a substring
#      of the PEM and is therefore not masked).
#
# Self-contained: no real GitHub-App credentials required. The synthetic
# PEM below is registered at runtime via ::add-mask:: which feeds the same
# HostContext.SecretMasker that processes repo / org secrets.

on:
  pull_request:
    paths:
      - .github/workflows/shared/apm.md
      - .github/workflows/verify-shared-apm-matrix.yml
  push:
    branches:
      - main
    paths:
      - .github/workflows/shared/apm.md
      - .github/workflows/verify-shared-apm-matrix.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  # Synthetic, non-functional PEM used in both job sets. Truncated key body
  # so it cannot accidentally be used to authenticate anywhere. Both job
  # sets register it via ::add-mask:: so the runner treats it as a secret.
  SYNTHETIC_PEM: |
    -----BEGIN RSA PRIVATE KEY-----
    MIIBOgIBAAJBAKj34GkxFhD90vcNLYLInFEX6Ppy1tPf9Cnzj4p4WGeKLs1Pt8Qu
    SYNTHETIC-TEST-KEY-DO-NOT-USE
    -----END RSA PRIVATE KEY-----

jobs:
  # =====================================================================
  # Job set A: regression sentinel.
  # =====================================================================
  a-bug-prep:
    name: A. Old pattern (broken) - prep
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
    steps:
      - name: Register synthetic PEM as a job secret
        id: pem
        run: |
          set -euo pipefail
          # ::add-mask:: registers the value in this job's SecretMasker.
          # Any subsequent step output OR job output containing this
          # substring will be subject to the runner's masking / stripping.
          while IFS= read -r line; do
            if [ -n "$line" ]; then echo "::add-mask::$line"; fi
          done <<< "$SYNTHETIC_PEM"
          # Pass through as a step output (step outputs are NOT subject
          # to the cross-job redaction filter; only job outputs are).
          {
            echo "pem<<PEMEOF"
            printf '%s\n' "$SYNTHETIC_PEM"
            echo "PEMEOF"
          } >> "$GITHUB_OUTPUT"
      - name: Emit broken-shape matrix (PEM embedded in job output)
        id: emit
        env:
          PEM: ${{ steps.pem.outputs.pem }}
        run: |
          set -euo pipefail
          # This is exactly the shape the pre-fix shared/apm.md emitted:
          # a matrix JSON whose "private-key" value contains the PEM.
          matrix=$(jq -nc --arg pk "$PEM" '{group:[{id:"x","private-key":$pk}]}')
          {
            echo "matrix=$matrix"
          } >> "$GITHUB_OUTPUT"
          # Note: we never echo $matrix to logs (masking would obscure it
          # anyway). The downstream job will receive an empty string here.

  a-bug-consume:
    name: A. Old pattern (broken) - assert stripped
    runs-on: ubuntu-latest
    needs: [a-bug-prep]
    steps:
      - name: Assert matrix output was stripped by GH secret filter
        env:
          GOT: ${{ needs.a-bug-prep.outputs.matrix }}
        run: |
          set -euo pipefail
          # GitHub Actions runs every job output through
          #   if (!string.Equals(out.Value, SecretMasker.MaskSecrets(out.Value)))
          #     context.Warning("Skip output '<name>' since it may contain secret.");
          # When the warning fires, the output is replaced with the empty
          # string before downstream jobs see it. We assert that holds.
          if [ -n "$GOT" ]; then
            echo "::error::Expected matrix output to be empty (stripped by GH redaction filter)."
            echo "::error::Got non-empty value of length ${#GOT}. Either GH changed the behaviour, or the synthetic PEM was not masked."
            exit 1
          fi
          echo "[OK] matrix output is empty -- GH redaction filter still active."
          echo "[OK] this proves shared/apm.md's pre-fix shape would silently break consumers."

  # =====================================================================
  # Job set B: positive proof that the env-relay fix survives.
  # =====================================================================
  b-fix-prep:
    name: B. New pattern (fixed) - prep
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
      expected_sha: ${{ steps.emit.outputs.expected_sha }}
    steps:
      - name: Register synthetic PEM as a job secret (proves output survives anyway)
        run: |
          set -euo pipefail
          # We mask the PEM in this job too, so the redaction filter is
          # primed. The point is: even with the PEM registered, our
          # secret-FREE matrix output must still survive end-of-job
          # masking because the JSON value does not contain the PEM
          # substring. This is the core property the fix relies on.
          while IFS= read -r line; do
            if [ -n "$line" ]; then echo "::add-mask::$line"; fi
          done <<< "$SYNTHETIC_PEM"
      - name: Emit secret-free matrix + non-secret expected_sha
        id: emit
        run: |
          set -euo pipefail
          # Two rows mirroring the production schema: one "legacy" group,
          # one "apps[]" group. No PEM, no app-id; only routing metadata.
          matrix=$(jq -nc '{group:[
            {id:"legacy",   kind:"legacy", index:0, "has-app":"true", owner:"", repositories:"", packages:[]},
            {id:"acme-app", kind:"apps",   index:0, "has-app":"true", owner:"acme", repositories:"", packages:[]}
          ]}')
          # SHA-256 of the PEM, computed AFTER stripping trailing newlines
          # so the legacy and apps[] rows in b-fix-consume can converge on
          # the same hash regardless of whether their resolution path went
          # through bash command substitution (which strips trailing \n)
          # or direct env-var read (which preserves them). A SHA is not a
          # substring of the PEM, so the masker leaves it alone.
          pem_trim="$SYNTHETIC_PEM"
          while [ "${pem_trim: -1}" = $'\n' ]; do pem_trim=${pem_trim%$'\n'}; done
          sha=$(printf '%s' "$pem_trim" | sha256sum | cut -d' ' -f1)
          {
            echo "matrix=$matrix"
            echo "expected_sha=$sha"
          } >> "$GITHUB_OUTPUT"
          echo "matrix rows: $(echo "$matrix" | jq '.group | length')"
          echo "expected_sha: $sha"

  b-fix-assert-shape:
    name: B. New pattern (fixed) - assert matrix survives
    runs-on: ubuntu-latest
    needs: [b-fix-prep]
    steps:
      - name: Assert matrix output non-empty and has expected rows
        env:
          GOT: ${{ needs.b-fix-prep.outputs.matrix }}
          GOT_SHA: ${{ needs.b-fix-prep.outputs.expected_sha }}
        run: |
          set -euo pipefail
          if [ -z "$GOT" ]; then
            echo "::error::matrix output is EMPTY -- the secret-free shape should NOT be stripped."
            echo "::error::Either the PEM substring leaked into the matrix JSON, or GH tightened the filter."
            exit 1
          fi
          count=$(printf '%s' "$GOT" | jq '.group | length')
          if [ "$count" != "2" ]; then
            echo "::error::expected 2 matrix rows, got $count"
            exit 1
          fi
          if [ -z "$GOT_SHA" ] || [ "${#GOT_SHA}" -ne 64 ]; then
            echo "::error::expected_sha output missing or wrong length: '$GOT_SHA'"
            exit 1
          fi
          echo "[OK] matrix output survived (length ${#GOT}, $count rows)."
          echo "[OK] expected_sha output survived ($GOT_SHA)."

  b-fix-consume:
    name: B. New pattern (fixed) - per-row env-relay
    runs-on: ubuntu-latest
    needs: [b-fix-prep]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.b-fix-prep.outputs.matrix) }}
    steps:
      - name: Re-register synthetic PEM as a job secret for this matrix row
        run: |
          set -euo pipefail
          while IFS= read -r line; do
            if [ -n "$line" ]; then echo "::add-mask::$line"; fi
          done <<< "$SYNTHETIC_PEM"
      - name: Resolve credentials for this matrix row (env-relay)
        env:
          # In production shared/apm.md these are substituted by gh-aw at
          # compile time from ${{ github.aw.import-inputs.* }}, set on
          # the apm job's env: block. Here we set them at step level so
          # we can reference the workflow-level env.SYNTHETIC_PEM (env
          # context is allowed in step-level env but not job-level env).
          AW_APM_LEGACY_APP_ID: '12345'
          AW_APM_LEGACY_PRIVATE_KEY: ${{ env.SYNTHETIC_PEM }}
          ROW_KIND: ${{ matrix.group.kind }}
          ROW_INDEX: ${{ matrix.group.index }}
        run: |
          # SECURITY: mirrors the production shared/apm.md hardenings.
          # Never `set -x` or echo $pk; ::add-mask:: registers the whole PEM
          # as one substring and will not mask individual lines.
          set -euo pipefail
          case "$ROW_KIND" in
            legacy)
              app_id="$AW_APM_LEGACY_APP_ID"
              pk="$AW_APM_LEGACY_PRIVATE_KEY"
              ;;
            apps)
              # Build the apps[] JSON inline with the synthetic PEM at
              # the indexed slot; mirrors what jq -r ".[$i]" does over
              # the substituted AW_APM_APPS in production shared/apm.md.
              apps_json=$(jq -nc --arg pk "$AW_APM_LEGACY_PRIVATE_KEY" '[{"app-id":"99999","private-key":$pk}]')
              app_id=$(printf '%s' "$apps_json" | jq -r --argjson i "$ROW_INDEX" '.[$i]["app-id"] // ""')
              pk=$(printf '%s' "$apps_json" | jq -r --argjson i "$ROW_INDEX" '.[$i]["private-key"] // ""')
              ;;
            *)
              echo "::error::unexpected kind '$ROW_KIND'"
              exit 1
              ;;
          esac
          if [ -z "$app_id" ] || [ -z "$pk" ]; then
            echo "::error::failed to resolve credentials for row kind=$ROW_KIND index=$ROW_INDEX"
            exit 1
          fi
          # Normalise trailing newline so legacy (direct env) and apps
          # (jq + $(...) which strips trailing \n) produce byte-identical
          # ROW_PRIVATE_KEY values, removing the asymmetry at the source.
          pk="${pk%$'\n'}"
          echo "::add-mask::$pk"
          # Random heredoc delimiter per https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#multiline-strings
          # which warns against fixed delimiters for arbitrary multi-line values.
          delim="APMPK_$(openssl rand -hex 16)"
          {
            echo "ROW_APP_ID=$app_id"
            printf 'ROW_PRIVATE_KEY<<%s\n' "$delim"
            printf '%s\n' "$pk"
            printf '%s\n' "$delim"
          } >> "$GITHUB_ENV"
      - name: Assert ROW_PRIVATE_KEY round-tripped intact
        env:
          EXPECTED_SHA: ${{ needs.b-fix-prep.outputs.expected_sha }}
          ROW_KIND: ${{ matrix.group.kind }}
        run: |
          set -euo pipefail
          if [ -z "${ROW_APP_ID:-}" ]; then
            echo "::error::ROW_APP_ID was not set by the resolver step"
            exit 1
          fi
          if [ -z "${ROW_PRIVATE_KEY:-}" ]; then
            echo "::error::ROW_PRIVATE_KEY was not set by the resolver step"
            exit 1
          fi
          # No normalisation needed here: the resolver now strips trailing
          # newlines uniformly before the heredoc, and the $GITHUB_ENV
          # heredoc parser strips exactly one trailing \n before the
          # delimiter (per FileCommandManager). Both paths converge on the
          # same byte sequence -- assert directly.
          got_sha=$(printf '%s' "$ROW_PRIVATE_KEY" | sha256sum | cut -d' ' -f1)
          if [ "$got_sha" != "$EXPECTED_SHA" ]; then
            echo "::error::ROW_PRIVATE_KEY SHA mismatch (got=$got_sha expected=$EXPECTED_SHA)"
            echo "::error::The env-relay corrupted the PEM body. Check newline/heredoc handling."
            exit 1
          fi
          echo "[OK] row kind=$ROW_KIND app_id=$ROW_APP_ID pk_sha=$got_sha matches expected."
